```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart To-Do List App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-section{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

#taskInput{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.add-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.add-btn:hover{
    background:#218838;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}

.clear-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.clear-btn:hover{
    background:#c82333;
}

ul{
    list-style:none;
}

li{
    background:#f8f9fa;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task-info{
    flex:1;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.task-date{
    font-size:12px;
    color:#777;
}

.actions button{
    margin-left:5px;
    padding:8px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.complete-btn{
    background:#28a745;
    color:white;
}

.edit-btn{
    background:#ffc107;
}

.delete-btn{
    background:#dc3545;
    color:white;
}

.empty{
    text-align:center;
    color:gray;
    margin-top:20px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <h1>📝 Smart To-Do List</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div class="stats">
        <div>Total Tasks: <span id="taskCount">0</span></div>
        <button class="clear-btn" onclick="clearAllTasks()">
            Clear All
        </button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
        Tasks are saved automatically using Local Storage
    </div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){

    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if(text === ""){
        alert("Please enter a task.");
        return;
    }

    tasks.push({
        text:text,
        completed:false,
        date:new Date().toLocaleString()
    });

    input.value = "";

    saveTasks();
    renderTasks();
}

function renderTasks(){

    const taskList = document.getElementById("taskList");
    const taskCount = document.getElementById("taskCount");

    taskCount.textContent = tasks.length;

    if(tasks.length === 0){
        taskList.innerHTML =
        '<p class="empty">No tasks available.</p>';
        return;
    }

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        const li = document.createElement("li");

        li.innerHTML = `
            <div class="task-info">
                <div class="${task.completed ? 'completed' : ''}">
                    ${task.text}
                </div>
                <div class="task-date">
                    Created: ${task.date}
                </div>
            </div>

            <div class="actions">
                <button class="complete-btn"
                onclick="toggleTask(${index})">✓</button>

                <button class="edit-btn"
                onclick="editTask(${index})">Edit</button>

                <button class="delete-btn"
                onclick="deleteTask(${index})">Delete</button>
            </div>
        `;

        taskList.appendChild(li);
    });
}

function toggleTask(index){
    tasks[index].completed =
    !tasks[index].completed;

    saveTasks();
    renderTasks();
}

function editTask(index){

    const updatedTask = prompt(
        "Edit Task",
        tasks[index].text
    );

    if(updatedTask !== null &&
       updatedTask.trim() !== ""){

        tasks[index].text =
        updatedTask.trim();

        saveTasks();
        renderTasks();
    }
}

function deleteTask(index){

    if(confirm("Delete this task?")){

        tasks.splice(index,1);

        saveTasks();
        renderTasks();
    }
}

function clearAllTasks(){

    if(confirm("Delete all tasks?")){

        tasks = [];

        saveTasks();
        renderTasks();
    }
}

document.getElementById("taskInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        addTask();
    }
});

renderTasks();

</script>

</body>
</html>
